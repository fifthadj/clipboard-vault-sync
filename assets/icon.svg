<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#4a90e2" opacity="0.95"/>

  <!-- Clipboard on the left -->
  <g transform="translate(40, 70)">
    <!-- Clipboard body -->
    <rect x="0" y="15" width="55" height="70" rx="4" fill="white" stroke="#333" stroke-width="2"/>

    <!-- Clipboard clip -->
    <rect x="18" y="0" width="19" height="20" rx="2" fill="#333"/>
    <circle cx="27.5" cy="12" r="4" fill="#4a90e2"/>

    <!-- Lines on clipboard -->
    <line x1="8" y1="30" x2="47" y2="30" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="42" x2="47" y2="42" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="54" x2="35" y2="54" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="66" x2="47" y2="66" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Arrow in the middle -->
  <g transform="translate(100, 105)">
    <!-- Arrow body -->
    <rect x="0" y="8" width="35" height="12" rx="4" fill="#333"/>

    <!-- Arrow head -->
    <polygon points="35,14 48,8 48,20" fill="#333"/>
  </g>

  <!-- Vault/Note on the right -->
  <g transform="translate(160, 70)">
    <!-- Note body -->
    <rect x="0" y="0" width="55" height="85" rx="4" fill="white" stroke="#333" stroke-width="2"/>

    <!-- Vault symbol (nested rectangles) -->
    <rect x="8" y="12" width="39" height="25" rx="2" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <rect x="12" y="20" width="31" height="15" rx="1" fill="none" stroke="#4a90e2" stroke-width="1.5"/>

    <!-- Lock symbol inside -->
    <circle cx="27.5" cy="32" r="3" fill="#4a90e2"/>

    <!-- Checkmarks below -->
    <polyline points="10,50 14,54 20,48" fill="none" stroke="#4a90e2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10,65 14,69 20,63" fill="none" stroke="#4a90e2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle glow effect -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#4a90e2" stroke-width="1" opacity="0.3"/>
</svg>
